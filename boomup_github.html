<!DOCTYPE html>
<html lang="ko">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>조직문화 BOOM UP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f6f6f4;--sur:#fff;--bd:#e8e8e5;--bd2:#d4d4d0;--t1:#1a1a1a;--t2:#555;--t3:#999;--ac:#1a1a1a;}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--t1);font-size:14px;min-height:100vh;}
.topbar{background:var(--sur);border-bottom:1px solid var(--bd);height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:200;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:28px;height:28px;background:#1a1a1a;border-radius:8px;display:flex;align-items:center;justify-content:center;}
.logo-icon svg{width:16px;height:16px;fill:#fff;}
.logo-text{font-size:15px;font-weight:700;}
.logo-q{font-size:11px;color:var(--t3);border:1px solid var(--bd);border-radius:99px;padding:2px 9px;background:#fafafa;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.tab-btn{background:none;border:none;padding:6px 12px;font-size:13px;font-weight:500;color:var(--t3);cursor:pointer;border-radius:8px;font-family:inherit;}
.tab-btn.on,.tab-btn:hover{background:#f0f0ee;color:var(--t1);}
.divline{width:1px;height:18px;background:var(--bd);}
.btn-write{background:var(--ac);color:#fff;border:none;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-write:hover{background:#333;}
.view{display:none;}.view.on{display:block;}
.stats-strip{display:flex;gap:10px;padding:14px 20px 0;overflow-x:auto;scrollbar-width:none;}
.stats-strip::-webkit-scrollbar{display:none;}
.sc{background:var(--sur);border:1px solid var(--bd);border-radius:10px;padding:12px 16px;flex-shrink:0;min-width:108px;}
.sc-l{font-size:11px;color:var(--t3);margin-bottom:2px;}
.sc-v{font-size:22px;font-weight:700;}
.sc-s{font-size:10px;color:#bbb;margin-top:1px;}
.filter-bar{display:flex;gap:6px;padding:12px 20px;flex-wrap:wrap;align-items:center;}
.chip{background:var(--sur);border:1px solid var(--bd);border-radius:99px;padding:5px 13px;font-size:12px;color:var(--t2);cursor:pointer;white-space:nowrap;font-family:inherit;}
.chip:hover{border-color:var(--bd2);}
.chip.on{background:var(--t1);color:#fff;border-color:var(--t1);}
select.fsel{background:var(--sur);border:1px solid var(--bd);border-radius:8px;padding:5px 10px;font-size:12px;color:var(--t2);cursor:pointer;font-family:inherit;outline:none;}
.fsep{width:1px;height:20px;background:var(--bd);flex-shrink:0;}
.board{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:0;padding:0 14px 28px;align-items:start;}
.col{padding:0 6px;}
.col-hd{display:flex;align-items:center;gap:6px;padding:14px 2px 10px;position:sticky;top:54px;background:var(--bg);z-index:10;}
.col-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.col-nm{font-size:12px;font-weight:600;}
.col-cnt{font-size:11px;color:var(--t3);background:#eee;border-radius:99px;padding:1px 7px;}
.col-plus{margin-left:auto;background:none;border:none;font-size:17px;color:#ccc;cursor:pointer;padding:0 2px;line-height:1;}
.col-plus:hover{color:var(--t2);}
.card{background:var(--sur);border:1px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:10px;transition:box-shadow .15s,border-color .15s;}
.card:hover{box-shadow:0 2px 14px rgba(0,0,0,.07);border-color:var(--bd2);}

.card.wb{border-color:#c87941;box-shadow:0 0 0 2px rgba(200,121,65,.15);}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.c-cat{display:inline-block;font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600;}
.c-right{display:flex;align-items:center;gap:5px;}

.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:#aaa;background:#fff;}

.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.m-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}

.btn-del:hover{background:#fff5f5;}
@media(max-width:640px){.board{grid-template-columns:1fr;padding:0 10px 20px;}.podium{grid-template-columns:1fr;}.frow{grid-template-columns:1fr;}}
</style>
</head>

<script>
// ╔══════════════════════════════════════════════════════════════╗
// ║           🐙 GitHub Issues API 연동 설정                     ║
// ║  아래 3줄만 본인 값으로 바꾸면 바로 작동합니다               ║
// ╚══════════════════════════════════════════════════════════════╝
const GH_REPO  = 'YOUR_ORG/YOUR_REPO';        // 예: mycompany/boomup-board
const GH_TOKEN = 'ghp_XXXXXXXXXXXXXXXXXXXX';  // GitHub Personal Access Token
const GH_LABEL = 'boomup';                    // Issues 필터용 라벨 (자유롭게 설정)
// ──────────────────────────────────────────────────────────────

const API = `https://api.github.com/repos/${GH_REPO}`;
const HDR = () => ({
  'Authorization': `token ${GH_TOKEN}`,
  'Accept': 'application/vnd.github+json',
  'Content-Type': 'application/json'
});

// GitHub Issue body에 JSON 메타데이터를 숨겨서 저장하는 방식
// 형식: 본문 내용\n\n<!-- BOOMUP_META:{"cat":"...","dp":"...","r":{...}} -->
const META_RE = /<!--\s*BOOMUP_META:(.*?)\s*-->/s;

function encodeMeta(data) {
  return `<!-- BOOMUP_META:${JSON.stringify(data)} -->`;
}
function decodeMeta(body) {
  try { const m = (body||'').match(META_RE); return m ? JSON.parse(m[1]) : {}; }
  catch(e) { return {}; }
}
function cleanBody(body) {
  return (body||'').replace(META_RE,'').trim();
}

// GitHub Issue → 내부 idea 객체로 변환
function issueToIdea(issue) {
  const meta = decodeMeta(issue.body);
  const cmts = (issue._comments||[]).map(c => {
    const cm = decodeMeta(c.body);
    return { id: c.id, nm: cm.nm||c.user?.login||'익명', dt: c.created_at.slice(0,10), tx: cleanBody(c.body) };
  });
  return {
    id: issue.number,
    ti: issue.title,
    bo: cleanBody(issue.body),
    nm: meta.nm || issue.user?.login || '익명',
    dp: meta.dp || '',
    cat: meta.cat || '업무치트키',
    st: meta.st || '검토중',
    lk: meta.lk || '',
    dt: issue.created_at.slice(0,10),
    r: meta.r || {heart:0,fire:0,clap:0,bulb:0},
    mr: meta.mr || {},
    cm: cmts
  };
}

// ── API 호출 헬퍼 ──────────────────────────────────────────────
async function ghFetch(path, method='GET', body=null) {
  const res = await fetch(`${API}${path}`, {
    method, headers: HDR(),
    body: body ? JSON.stringify(body) : null
  });
  if (!res.ok) {
    const err = await res.json().catch(()=>({}));
    throw new Error(err.message || `GitHub API 오류 ${res.status}`);
  }
  return res.status === 204 ? null : res.json();
}

// ── 상태 표시 ──────────────────────────────────────────────────
const stEl = document.createElement('div');
stEl.style.cssText = 'position:fixed;bottom:16px;right:16px;font-size:11px;padding:5px 14px;border-radius:99px;z-index:9999;transition:all .3s;pointer-events:none;background:#888;color:#fff;';
stEl.textContent = '🔄 불러오는 중...';
document.body.appendChild(stEl);
function setSt(msg, color, fade=false) {
  stEl.textContent = msg; stEl.style.background = color; stEl.style.opacity = '1';
  if (fade) setTimeout(() => stEl.style.opacity = '0', 2500);
}

async function seedSampleData() {
  setSt('📝 샘플 데이터 삽입 중...', '#888');
  for (const s of SAMPLE_IDEAS) {
    const meta = encodeMeta({ nm: s.nm, dp: s.dp, cat: s.cat, st: s.st, lk: s.lk, r: s.r, mr: {} });
    const issue = await ghFetch('/issues', 'POST', {
      title: s.ti,
      body: `${s.bo}\n\n${meta}`,
      labels: [GH_LABEL]
    });
    // 댓글도 순서대로 삽입
    for (const c of (s.comments||[])) {
      const cmeta = encodeMeta({ nm: c.nm });
      await ghFetch(`/issues/${issue.number}/comments`, 'POST', {
        body: `${c.tx}\n\n${cmeta}`
      });
    }
  }
}

// ── 데이터 로드 (Issues + Comments) ───────────────────────────
async function loadIdeas() {
  setSt('🔄 불러오는 중...', '#888');
  try {
    const issues = await ghFetch(`/issues?labels=${GH_LABEL}&state=open&per_page=100`);
    // 댓글을 병렬로 가져오기
    const withCmts = await Promise.all(issues.map(async iss => {
      if (iss.comments > 0) {
        const cmts = await ghFetch(`/issues/${iss.number}/comments`);
        iss._comments = cmts;
      } else { iss._comments = []; }
      return iss;
    }));
    ideas = withCmts.map(issueToIdea);
    setSt('✅ 연결됨', '#22c55e', true);
    rb(); rss();
  } catch(e) {
    setSt('❌ ' + e.message, '#ef4444');
    console.error(e);
  }
}

// ── 글 저장 ───────────────────────────────────────────────────
async function ghSaveIdea(idea, issueNum=null) {
  const meta = encodeMeta({ nm: idea.nm, dp: idea.dp, cat: idea.cat, st: idea.st, lk: idea.lk, r: idea.r, mr: idea.mr });
  const payload = { title: idea.ti, body: `${idea.bo}\n\n${meta}`, labels: [GH_LABEL] };
  if (issueNum) {
    await ghFetch(`/issues/${issueNum}`, 'PATCH', payload);
  } else {
    await ghFetch('/issues', 'POST', payload);
  }
}

// ── 리액션 업데이트 (Issue body 수정) ─────────────────────────
async function ghUpdateReactions(idea) {
  const meta = encodeMeta({ nm: idea.nm, dp: idea.dp, cat: idea.cat, st: idea.st, lk: idea.lk, r: idea.r, mr: idea.mr });
  await ghFetch(`/issues/${idea.id}`, 'PATCH', { body: `${idea.bo}\n\n${meta}` });
}

// ── 댓글 저장 ─────────────────────────────────────────────────
async function ghAddComment(issueNum, nm, text) {
  const meta = encodeMeta({ nm });
  await ghFetch(`/issues/${issueNum}/comments`, 'POST', { body: `${text}\n\n${meta}` });
}

// ── 글 삭제 (close issue) ─────────────────────────────────────
async function ghCloseIssue(issueNum) {

}

const tod=()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;};
const fmt=d=>{if(!d)return'';const p=d.slice(0,10).split('-');return`${p[1]}/${p[2]}`;};
const getQ=()=>{const n=new Date();return`${n.getFullYear()} Q${Math.ceil((n.getMonth()+1)/3)}`;};
const sc=i=>Object.values(i.r||{}).reduce((a,b)=>a+b,0)+(i.cm||[]).length*2;
const tR=i=>Object.values(i.r||{}).reduce((a,b)=>a+b,0);

// ── 보드 렌더링 ───────────────────────────────────────────────
function rb(){
  const board=document.getElementById('board');
  board.innerHTML='';
  const sf1=document.getElementById('fs1').value;
  const sf2=document.getElementById('fs2').value;
  const ranked=[...ideas].sort((a,b)=>sc(b)-sc(a));
  Object.keys(CAT).forEach(cat=>{
    if(catF!=='all'&&catF!==cat)return;
    let items=ideas.filter(i=>i.cat===cat);
    if(sf1!=='all')items=items.filter(i=>i.st===sf1);
    if(sf2==='reactions')items.sort((a,b)=>tR(b)-tR(a));
    else if(sf2==='comments')items.sort((a,b)=>(b.cm||[]).length-(a.cm||[]).length);
    else items.sort((a,b)=>b.id-a.id);
    const col=document.createElement('div');
    col.className='col';
    col.innerHTML=`<div class="col-hd"><div class="col-dot" style="background:${CAT[cat].dot}"></div><span class="col-nm">${cat}</span><span class="col-cnt">${items.length}</span><button class="col-plus" onclick="openW('${cat}')">+</button></div>`;
    if(!items.length)col.innerHTML+=`<div style="font-size:12px;color:#ccc;padding:6px 2px;">아직 글이 없어요</div>`;
    items.forEach(idea=>{const rank=ranked.findIndex(i=>i.id===idea.id);col.appendChild(bc(idea,rank));});
    board.appendChild(col);
  });
  rss();
}

// ── 카드 렌더링 ───────────────────────────────────────────────
function bc(idea,rank){
  const m=CAT[idea.cat]||CAT['오프리듬'];
  const sm=STM[idea.st]||{d:'#888'};
  let wc='',wb='';
  if(rank===0){wc='wg';wb='<div class="win-b wg-b">🥇 이번 분기 1위</div>';}
  else if(rank===1){wc='ws';wb='<div class="win-b ws-b">🥈 2위</div>';}
  else if(rank===2){wc='wb';wb='<div class="win-b wb-b">🥉 3위</div>';}
  const rxH=RX.map(r=>{const cnt=(idea.r||{})[r.k]||0;const on=(idea.mr||{})[r.k]?r.c:'';return`<button class="rxn ${on}" onclick="tr2(${idea.id},'${r.k}')" title="${r.l}"><span class="rxn-e">${r.e}</span>${cnt>0?`<span>${cnt}</span>`:''}</button>`;}).join('');
  const d=document.createElement('div');
  d.className=`card ${wc}`;d.id=`card-${idea.id}`;
  d.innerHTML=`${wb}<div class="card-top"><span class="c-cat" style="background:${m.bg};color:${m.co}">${idea.cat}</span><div class="c-right"><div class="c-st"><div class="sdot" style="background:${sm.d}"></div>${idea.st}</div><button class="edit-btn" onclick="openE(${idea.id})">✏️</button></div></div><div class="c-title">${idea.ti}</div><div class="c-body" id="bd-${idea.id}">${idea.bo.replace(/\n/g,'<br>')}</div><button class="exp-btn" onclick="texp(${idea.id})">더 보기 ▾</button>${idea.lk?`<a class="c-link" href="${idea.lk}" target="_blank">🔗 ${idea.lk}</a>`:''}<div class="c-foot"><div class="c-meta"><div class="au-row"><div class="av" style="background:${avc(idea.nm)}">${(idea.nm||'?').slice(0,2)}</div><span class="au-nm">${idea.nm}${idea.dp?` · ${idea.dp}`:''}</span></div><span class="c-date">${fmt(idea.dt)}</span></div><div class="rxns" id="rxns-${idea.id}">${rxH}</div><button class="cmt-tog" onclick="tcmts(${idea.id})">💬 댓글 ${(idea.cm||[]).length}개${(idea.cm||[]).length?' 보기':' 달기'}</button><div class="cmts-w" id="cmts-${idea.id}" style="display:none;"></div></div>`;
  return d;
}

function texp(id){const b=document.getElementById(`bd-${id}`);const btn=b.nextElementSibling;const e=b.classList.toggle('exp');btn.textContent=e?'접기 ▴':'더 보기 ▾';}

// ── 리액션 ────────────────────────────────────────────────────
async function tr2(id, key){
  const idea=ideas.find(i=>i.id===id);if(!idea)return;
  if(!idea.mr)idea.mr={};
  if(idea.mr[key]){idea.mr[key]=false;idea.r[key]=Math.max(0,(idea.r[key]||0)-1);}
  else{idea.mr[key]=true;idea.r[key]=(idea.r[key]||0)+1;}
  // 로컬 UI 즉시 반영
  const el=document.getElementById(`rxns-${id}`);
  if(el)el.innerHTML=RX.map(r=>{const cnt=(idea.r||{})[r.k]||0;const on=(idea.mr||{})[r.k]?r.c:'';return`<button class="rxn ${on}" onclick="tr2(${id},'${r.k}')" title="${r.l}"><span class="rxn-e">${r.e}</span>${cnt>0?`<span>${cnt}</span>`:''}</button>`;}).join('');
  rss();
  try { await ghUpdateReactions(idea); setSt('✅ 저장됨','#22c55e',true); }
  catch(e){ setSt('❌ 저장 실패','#ef4444'); }
}

function tcmts(id){
  const el=document.getElementById(`cmts-${id}`);const idea=ideas.find(i=>i.id===id);if(!el||!idea)return;
  const open=el.style.display==='none';el.style.display=open?'block':'none';
  if(open){
    const cms=idea.cm||[];
    const ch=cms.length?cms.map(c=>`<div class="ci"><div class="ci-hd"><div class="av" style="background:${avc(c.nm)};width:18px;height:18px;font-size:8px;">${(c.nm||'?').slice(0,2)}</div><span class="ci-nm">${c.nm}</span><span class="ci-dt">${fmt(c.dt)}</span></div><div class="ci-tx">${c.tx}</div></div>`).join(''):`<div style="font-size:11px;color:#bbb;padding:4px 0;">첫 댓글을 남겨보세요!</div>`;
    el.innerHTML=`<div class="clist">${ch}</div><div class="cmt-row"><input id="ci-${id}" placeholder="댓글을 입력하세요..." onkeydown="if(event.key==='Enter')acmt(${id})"><button onclick="acmt(${id})">등록</button></div>`;
  }
  const btn=el.previousElementSibling;if(btn)btn.textContent=`💬 댓글 ${(idea.cm||[]).length}개 ${open?'접기':'보기'}`;
}

async function acmt(id){
  const inp=document.getElementById(`ci-${id}`);const text=inp?.value.trim();if(!text)return;
  const nm=prompt('이름을 입력해주세요:')||'익명';

    await ghAddComment(id, nm, text);

function sp(p,btn){awP=p;document.querySelectorAll('.p-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');ra();}

function bpd(list){
  if(awP==='all')return list;
  const n=new Date();
  return list.filter(i=>{const d=new Date(i.dt);if(awP==='month')return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();return Math.ceil((d.getMonth()+1)/3)===Math.ceil((n.getMonth()+1)/3)&&d.getFullYear()===n.getFullYear();});
}

function ra(){
  const pool=bpd(ideas);
  if(!pool.length){['pod-r','pod-c','r-table'].forEach(id=>document.getElementById(id).innerHTML=`<div class="no-data">해당 기간 게시물이 없어요</div>`);return;}
  const byR=[...pool].sort((a,b)=>tR(b)-tR(a));
  const byC=[...pool].sort((a,b)=>(b.cm||[]).length-(a.cm||[]).length);
  const byS=[...pool].sort((a,b)=>sc(b)-sc(a));
  const pc=['pg','ps','pb'],pe=['🥇','🥈','🥉'];
  const pod=sorted=>sorted.slice(0,3).map((idea,i)=>`<div class="pc ${pc[i]}"><div class="p-rank">${pe[i]}</div><div class="p-title">${idea.ti}</div><div class="p-au">${idea.nm}${idea.dp?` · ${idea.dp}`:''}</div><div class="p-stats"><span>❤️ ${tR(idea)}</span><span>💬 ${(idea.cm||[]).length}</span></div></div>`).join('');
  document.getElementById('pod-r').innerHTML=pod(byR);
  document.getElementById('pod-c').innerHTML=pod(byC);
  const mx=sc(byS[0])||1;
  document.getElementById('r-table').innerHTML=byS.slice(0,10).map((idea,i)=>`<div class="r-row"><span class="r-n">${i+1}</span><div style="flex:1;min-width:0;"><div class="r-title">${idea.ti}</div><div class="rbar" style="margin-top:4px;"><div class="rbar-f" style="width:${Math.round(sc(idea)/mx*100)}%"></div></div></div><span class="r-au">${idea.nm}</span><span class="r-sc">❤️${tR(idea)} 💬${(idea.cm||[]).length}</span></div>`).join('');
}

// ── 글 작성/수정 모달 ─────────────────────────────────────────
function openW(cat){
  eid=null;
  document.getElementById('m-ttl').textContent='새 글 작성';
  document.getElementById('b-del').style.display='none';
  document.getElementById('b-ok').textContent='등록하기';
  ['m-nm','m-dp','m-ti','m-bo','m-lk'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('m-st').value='검토중';
  if(cat) document.getElementById('m-ct').value=cat;
  document.getElementById('mbg').classList.add('on');
}

function openE(id){
  const idea=ideas.find(i=>i.id===id);if(!idea)return;
  eid=id;
  document.getElementById('m-ttl').textContent='글 수정';
  document.getElementById('b-del').style.display='block';
  document.getElementById('b-ok').textContent='저장하기';
  document.getElementById('m-nm').value=idea.nm||'';
  document.getElementById('m-dp').value=idea.dp||'';
  document.getElementById('m-ct').value=idea.cat;
  document.getElementById('m-ti').value=idea.ti;
  document.getElementById('m-bo').value=idea.bo;
  document.getElementById('m-lk').value=idea.lk||'';
  document.getElementById('m-st').value=idea.st;
  document.getElementById('mbg').classList.add('on');
}

function closeM(){document.getElementById('mbg').classList.remove('on');eid=null;}
document.getElementById('mbg').addEventListener('click',function(e){if(e.target===this)closeM();});

async function subCard(){
  const ti=document.getElementById('m-ti').value.trim();
  const bo=document.getElementById('m-bo').value.trim();
  if(!ti||!bo){alert('제목과 내용은 필수예요!');return;}
  const data={
    nm: document.getElementById('m-nm').value.trim()||'익명',
    dp: document.getElementById('m-dp').value.trim(),
    cat: document.getElementById('m-ct').value,
    ti, bo,
    lk: document.getElementById('m-lk').value.trim(),
    st: document.getElementById('m-st').value,
    r: eid ? (ideas.find(i=>i.id===eid)||{}).r||{heart:0,fire:0,clap:0,bulb:0} : {heart:0,fire:0,clap:0,bulb:0},
    mr: eid ? (ideas.find(i=>i.id===eid)||{}).mr||{} : {}
  };
  document.getElementById('b-ok').textContent = '저장 중...';
  document.getElementById('b-ok').disabled = true;
  setSt('💾 저장 중...','#888');
  try {
    await ghSaveIdea(data, eid||null);
    setSt('✅ 저장됨','#22c55e',true);
    closeM();
    await loadIdeas();
  } catch(e){
    setSt('❌ 저장 실패: ' + e.message,'#ef4444');
    document.getElementById('b-ok').textContent = eid ? '저장하기' : '등록하기';
    document.getElementById('b-ok').disabled = false;
  }
}

async function delCard(){
  if(!eid||!confirm('이 글을 삭제할까요?'))return;
  setSt('🗑 삭제 중...','#888');
  try {
    await ghCloseIssue(eid);
    setSt('✅ 삭제됨','#22c55e',true);
    closeM();
    await loadIdeas();
  } catch(e){ setSt('❌ 삭제 실패','#ef4444'); }
}

// ── 초기 실행 ─────────────────────────────────────────────────
ensureLabel().then(async () => {
  // Issues가 비어있으면 샘플 데이터 1회 자동 삽입
  try {
    const existing = await ghFetch(`/issues?labels=${GH_LABEL}&state=open&per_page=1`);
    if (existing.length === 0) {
      await seedSampleData();
    }
  } catch(e) { /* 권한 없으면 그냥 로드만 */ }
  loadIdeas();
});
</script>
