<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>조직문화 BOOM UP - Avikus</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');
  
  /* 기본 스타일 & 변수 */
  :root {
    --bg-gray: #f7f7f5;
    --border-color: #e8e8e5;
    --primary-black: #1a1a1a;
    --text-sub: #888;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Pretendard', sans-serif;background:var(--bg-gray);color:var(--primary-black);font-size:14px;overflow-x:hidden;}

  /* TOP BAR */
  .topbar{background:#fff;border-bottom:1px solid var(--border-color);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;}
  .topbar-left{display:flex;align-items:center;gap:12px;}
  .topbar-title{font-size:18px;font-weight:700;}
  .quarter-tag{font-size:11px;color:#888;border:1px solid #e0e0e0;border-radius:99px;padding:3px 12px;background:#fafafa;font-weight:600;}

  /* 📊 STATS DASHBOARD (이미지 UI 반영) */
  .stats-container {
    display: flex;
    gap: 16px;
    padding: 24px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .stat-card {
    background: #fff;
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 20px;
    min-width: 140px;
    flex: 1;
    box-shadow: 0 2px 8px rgba(0,0,0,0.02);
  }
  .stat-label { font-size: 12px; color: var(--text-sub); margin-bottom: 8px; display: block; }
  .stat-value { font-size: 28px; font-weight: 700; display: block; }
  .stat-desc { font-size: 11px; color: #bbb; margin-top: 4px; }

  /* BOARD GRID */
  .board{display:grid;grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));gap:24px;padding:0 24px 40px;}
  .col-header{display:flex;align-items:center;gap:8px;padding:12px 4px;position:sticky;top:64px;background:var(--bg-gray);z-index:10;margin-bottom:12px;}
  .col-dot{width:8px;height:8px;border-radius:50%;}
  .col-name{font-size:14px;font-weight:700;}
  .col-cnt{font-size:11px;color:#888;background:#eee;border-radius:99px;padding:2px 8px;margin-left:4px;}

  /* CARD STYLE */
  .card{background:#fff;border:1px solid var(--border-color);border-radius:16px;padding:20px;margin-bottom:16px;transition:transform 0.2s, box-shadow 0.2s;position:relative;}
  .card:hover{transform:translateY(-4px);box-shadow:0 12px 24px rgba(0,0,0,0.06);}
  .card-cat-tag{display:inline-block;font-size:10px;padding:3px 10px;border-radius:99px;font-weight:700;margin-bottom:12px;}
  .status-row{display:flex;align-items:center;gap:6px;font-size:11px;color:#888;margin-bottom:10px;}
  .status-dot{width:6px;height:6px;border-radius:50%;}
  .card-title{font-size:15px;font-weight:700;line-height:1.4;margin-bottom:12px;}
  .card-body{font-size:13px;color:#444;line-height:1.7;margin-bottom:16px;white-space:pre-wrap;display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden;}
  .card-footer{border-top:1px solid #f2f2f0;padding-top:14px;display:flex;justify-content:space-between;align-items:center;}
  .author-info{display:flex;align-items:center;gap:8px;}
  .avatar{width:24px;height:24px;border-radius:50%;background:#eee;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:700;}
  .card-date{font-size:11px;color:#bbb;}

  /* ✍️ MODAL UI (이미지 반영) */
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
  .modal-bg.open{display:flex;}
  .modal{background:#fff;border-radius:24px;padding:32px;width:560px;max-width:90vw;box-shadow:0 24px 60px rgba(0,0,0,0.2);}
  .modal h3{font-size:20px;font-weight:700;margin-bottom:24px;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
  .form-group{margin-bottom:20px;}
  .form-label{font-size:12px;font-weight:600;color:#666;margin-bottom:8px;display:block;}
  .form-control{width:100%;border:1px solid #ddd;border-radius:12px;padding:12px 16px;font-size:14px;font-family:inherit;background:#fafafa;outline:none;}
  .form-control:focus{border-color:var(--primary-black);background:#fff;}
  .form-textarea{min-height:120px;resize:vertical;}
  .modal-footer{display:flex;gap:12px;justify-content:flex-end;margin-top:24px;}
  .btn{border-radius:12px;padding:12px 24px;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:0.2s;}
  .btn-cancel{background:#f5f5f3;color:#666;}
  .btn-submit{background:var(--primary-black);color:#fff;}
  .btn-submit:hover{background:#333;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-title">조직문화 BOOM UP</span>
    <span class="quarter-tag">2026 Q1</span>
  </div>
  <button class="btn btn-submit" style="padding:8px 16px;" onclick="openModal()">+ 새 글 작성</button>
</div>

<div class="stats-container" id="stats-dashboard"></div>

<div class="board" id="board"></div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3>새 글 작성</h3>
    <div class="form-group">
      <label class="form-label">작성자 이름</label>
      <input class="form-control" id="m-name" placeholder="예: 강찬미">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">부서</label>
        <input class="form-control" id="m-dept" placeholder="부서명">
      </div>
      <div class="form-group">
        <label class="form-label">카테고리</label>
        <select class="form-control" id="m-cat">
          <option value="업무치키">업무치키 (The Shortcut)</option>
          <option value="팀패치노트">팀 패치노트 (Patch Notes)</option>
          <option value="기술SOS">기술 SOS (집단지성)</option>
          <option value="에너지세이버">에너지 세이버</option>
          <option value="미식가이드">미식 가이드</option>
          <option value="오프리듬">오프 리듬</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">제목 *</label>
      <input class="form-control" id="m-title" placeholder="한 줄로 요약해주세요">
    </div>
    <div class="form-group">
      <label class="form-label">내용 *</label>
      <textarea class="form-control form-textarea" id="m-body" placeholder="자유롭게 작성해주세요"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group" style="grid-column: span 2;">
        <label class="form-label">상태</label>
        <select class="form-control" id="m-status">
          <option value="검토중">검토 중</option>
          <option value="투표중">투표 중</option>
          <option value="채택완료">채택 완료</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn btn-submit" onclick="submitNewIdea()">등록하기</button>
    </div>
  </div>
</div>

<script>
const CAT_META = {
  '업무치키': { label:'업무치키 (The Shortcut)', dot:'#378ADD', bg:'#E6F1FB', color:'#0C447C' },
  '팀패치노트': { label:'팀 패치노트 (Patch Notes)', dot:'#7F77DD', bg:'#EEEDFE', color:'#3C3489' },
  '기술SOS': { label:'기술 SOS (집단지성)', dot:'#639922', bg:'#EAF3DE', color:'#27500A' },
  '에너지세이버': { label:'에너지 세이버', dot:'#BA7517', bg:'#FAEEDA', color:'#633806' },
  '미식가이드': { label:'미식 가이드', dot:'#D4537E', bg:'#FBEAF0', color:'#72243E' },
  '오프리듬': { label:'오프 리듬', dot:'#888780', bg:'#F1EFE8', color:'#444441' }
};

const STATUS_COLOR = { '검토중': '#888', '투표중': '#BA7517', '채택완료': '#3B6D11' };

// 데이터 로드
let ideas = JSON.parse(localStorage.getItem('avikus_boom_v3')) || [
  { id:1, cat:'업무치키', status:'검토중', title:'Claude로 보고서 초안 잡기', body:'보고서 작성이 빨라집니다.', name:'강찬미', dept:'hr팀', date:'03/25', reactions: 24 },
  { id:2, cat:'팀패치노트', status:'채택완료', title:'오전 몰입 타임 도입', body:'집중 근무 시간을 준수합시다.', name:'강찬미', dept:'개발팀', date:'03/24', reactions: 12 }
];

function updateDashboard() {
  const dash = document.getElementById('stats-dashboard');
  const counts = {
    total: ideas.length,
    reactions: ideas.reduce((s, i) => s + (i.reactions || 0), 0),
    adopted: ideas.filter(i => i.status === '채택완료').length,
    review: ideas.filter(i => i.status === '검토중').length,
    voting: ideas.filter(i => i.status === '투표중').length
  };

  dash.innerHTML = `
    <div class="stat-card"><span class="stat-label">전체 글</span><span class="stat-value">${counts.total}</span><span class="stat-desc">이번 분기</span></div>
    <div class="stat-card"><span class="stat-label">총 반응</span><span class="stat-value">${counts.reactions}</span><span class="stat-desc">좋아요·공감 등</span></div>
    <div class="stat-card"><span class="stat-label">채택 완료</span><span class="stat-value">${counts.adopted}</span><span class="stat-desc">실제 도입됨</span></div>
    <div class="stat-card"><span class="stat-label">검토 중</span><span class="stat-value">${counts.review}</span></div>
    <div class="stat-card"><span class="stat-label">투표 진행</span><span class="stat-value">${counts.voting}</span></div>
  `;
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  Object.keys(CAT_META).forEach(cat => {
    const meta = CAT_META[cat];
    const filtered = ideas.filter(i => i.cat === cat);
    const col = document.createElement('div');
    col.innerHTML = `
      <div class="col-header"><div class="col-dot" style="background:${meta.dot}"></div><span class="col-name">${cat}</span><span class="col-cnt">${filtered.length}</span></div>
      ${filtered.map(idea => `
        <div class="card">
          <span class="card-cat-tag" style="background:${meta.bg}; color:${meta.color}">${meta.label}</span>
          <div class="status-row">
            <div class="status-dot" style="background:${STATUS_COLOR[idea.status]}"></div>
            <span>${idea.status}</span>
          </div>
          <div class="card-title">${idea.title}</div>
          <div class="card-body">${idea.body}</div>
          <div class="card-footer">
            <div class="author-info">
              <div class="avatar" style="background:${meta.bg}">${idea.name.substring(0,1)}</div>
              <span style="font-size:12px; font-weight:600;">${idea.name} · ${idea.dept}</span>
            </div>
            <span class="card-date">${idea.date}</span>
          </div>
        </div>
      `).join('')}
    `;
    board.appendChild(col);
  });
  updateDashboard();
}

function openModal() { document.getElementById('modal-bg').classList.add('open'); }
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }

function submitNewIdea() {
  const title = document.getElementById('m-title').value;
  const body = document.getElementById('m-body').value;
  if(!title || !body) return alert('내용을 채워주세요!');

  const newIdea = {
    id: Date.now(),
    name: document.getElementById('m-name').value || '익명',
    dept: document.getElementById('m-dept').value || '미소속',
    cat: document.getElementById('m-cat').value,
    title, body,
    status: document.getElementById('m-status').value,
    date: '03/25',
    reactions: 0
  };

  ideas.unshift(newIdea);
  localStorage.setItem('avikus_boom_v3', JSON.stringify(ideas));
  renderBoard();
  closeModal();
}

renderBoard();
</script>
</body>
</html>
